version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - TESTSSL_PATH=/opt/testssl.sh/testssl.sh
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
